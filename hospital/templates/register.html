{% extends 'base.html' %}

{% block content %}

<div style="display:flex; justify-content:center; align-items:center; height:80vh;">
    
    <div style="width:350px; padding:30px; border-radius:10px; 
                box-shadow:0 4px 15px rgba(0,0,0,0.1); 
                background:white; text-align:center;">

        <h2 style="margin-bottom:20px;">Register</h2>

        <form method="POST">
            {% csrf_token %}
            
            <input type="text" name="username" placeholder="Username" required
                style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">

            <input type="email" name="email" placeholder="Email" required
                style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;">

            <input type="password" name="password" placeholder="Password" required
                style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:5px;">

            <button type="submit"
                style="width:100%; padding:10px; background:#4A90E2; color:white; border:none; border-radius:5px; cursor:pointer;">
                Register
            </button>
        </form>

        <p style="margin-top:15px;">
            Already have an account? 
            <a href="{% url 'login' %}" style="color:#4A90E2;">Login</a>
        </p>

    </div>

</div>

{% endblock %}
